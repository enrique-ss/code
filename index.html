<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Code Quest</title>
    
    <!-- Phaser 3 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a2e;
        }
        
        #game-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        #game-container canvas {
            display: block;
        }
    </style>
</head>
<body>

    <!-- Phaser Canvas Container -->
    <div id="game-container"></div>

    <!-- Game Scripts -->
    <!-- Managers -->
    <script src="js/managers/game-state.js"></script>
    <script src="js/managers/save-manager.js"></script>
    <script src="js/managers/event-manager.js"></script>
    <script src="js/managers/choice-manager.js"></script>
    <script src="js/managers/climate-manager.js"></script>
    <script src="js/managers/ending-manager.js"></script>
    <script src="js/managers/class-manager.js"></script>
    <script src="js/managers/map-manager.js"></script>
    <script src="js/managers/json-vision-manager.js"></script>
    <script src="js/managers/hud-manager.js"></script>
    
    <!-- Scenes -->
    <script src="js/scenes/preload-scene.js"></script>
    <script src="js/scenes/menu-scene.js"></script>
    <script src="js/scenes/character-creation-scene.js"></script>
    <script src="js/scenes/game-scene.js"></script>
    <script src="js/scenes/transition-scene.js"></script>

    <!-- Main -->
    <script src="js/main.js"></script>
